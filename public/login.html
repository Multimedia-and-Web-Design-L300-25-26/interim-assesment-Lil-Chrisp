<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Coinbase Clone</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="/" class="logo">Coinbase Clone</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/register.html">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="container auth-page">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p>Log in to access your portfolio and manage your assets.</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-primary btn-full">Log In</button>
      </form>

      <div id="message"></div>

      <p class="auth-footer">Don't have an account? <a href="/register.html">Sign up</a></p>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const result = await login(email, password);
      const msgDiv = document.getElementById('message');

      if (result.success) {
        msgDiv.innerHTML = '<p class="success">' + result.message + '</p>';
        setTimeout(() => {
          window.location.href = '/';
        }, 1500);
      } else {
        msgDiv.innerHTML = '<p class="error">' + (result.message || 'Login failed') + '</p>';
      }
    });
  </script>
</body>
</html>
