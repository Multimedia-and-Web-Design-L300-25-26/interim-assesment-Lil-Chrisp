<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Cryptocurrency - Coinbase Clone</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="/" class="logo">Coinbase Clone</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/crypto/gainers.html">Top Gainers</a></li>
        <li><a href="/crypto/new.html">New Listings</a></li>
        <li><a href="/profile.html">Profile</a></li>
        <li id="auth-links">
          <a href="/login.html">Login</a>
          <a href="/register.html" class="btn-primary">Get Started</a>
        </li>
        <li id="logout-link" style="display:none;">
          <button onclick="logout()" class="btn-secondary">Logout</button>
        </li>
      </ul>
    </div>
  </nav>

  <main class="container auth-page">
    <div class="auth-card">
      <h2>Add New Cryptocurrency</h2>
      <p>Add a new tradable cryptocurrency to the platform.</p>

      <form id="add-crypto-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Bitcoin" required>
        </div>

        <div class="form-group">
          <label for="symbol">Symbol</label>
          <input type="text" id="symbol" name="symbol" placeholder="e.g. BTC" required>
        </div>

        <div class="form-group">
          <label for="price">Price (USD)</label>
          <input type="number" id="price" name="price" placeholder="e.g. 45000" step="0.01" required>
        </div>

        <div class="form-group">
          <label for="image">Image URL</label>
          <input type="url" id="image" name="image" placeholder="https://example.com/image.png" required>
        </div>

        <div class="form-group">
          <label for="change24h">24h Change (%)</label>
          <input type="number" id="change24h" name="change24h" placeholder="e.g. 2.5" step="0.01" required>
        </div>

        <button type="submit" class="btn-primary btn-full">Add Cryptocurrency</button>
      </form>

      <div id="message"></div>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkAuthStatus();
    });

    document.getElementById('add-crypto-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const symbol = document.getElementById('symbol').value;
      const price = parseFloat(document.getElementById('price').value);
      const image = document.getElementById('image').value;
      const change24h = parseFloat(document.getElementById('change24h').value);

      const result = await addCrypto({ name, symbol, price, image, change24h });
      const msgDiv = document.getElementById('message');

      if (result.success) {
        msgDiv.innerHTML = '<p class="success">' + result.message + '</p>';
        document.getElementById('add-crypto-form').reset();
        setTimeout(() => {
          window.location.href = '/';
        }, 1500);
      } else {
        msgDiv.innerHTML = '<p class="error">' + (result.message || 'Failed to add cryptocurrency') + '</p>';
      }
    });
  </script>
</body>
</html>
