<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Crypto App | Student Project</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="/" class="logo">Crypto App</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/login.html">Login</a></li>
      </ul>
    </div>
  </nav>

  <main class="container auth-page">
    <div class="auth-card">
      <h2>Create an account</h2>
      <p>Join our student crypto project.</p>

      <div class="demo-warning">⚠️ Demo app – do not use your real password</div>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password (min 6 characters)" required minlength="6">
        </div>

        <button type="submit" class="btn-primary btn-full">Create Account</button>
      </form>

      <div id="message"></div>

      <p class="auth-footer">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const result = await register(name, email, password);
      const msgDiv = document.getElementById('message');

      if (result.success) {
        msgDiv.innerHTML = '<p class="success">' + result.message + '</p>';
        setTimeout(() => {
          window.location.href = '/';
        }, 1500);
      } else {
        msgDiv.innerHTML = '<p class="error">' + (result.message || 'Registration failed') + '</p>';
      }
    });
  </script>
</body>
</html>
